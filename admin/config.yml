backend:
  name: git-gateway
  branch: main

media_folder: "images/albums"
public_folder: "/images/albums"

locale: ko

collections:
  - name: "albums"
    label: "📸 학교 앨범"
    label_singular: "앨범"
    folder: "_albums"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort: "date:desc"
    fields:
      - label: "앨범 제목"
        name: "title"
        widget: "string"
        hint: "예: 2024년 졸업식, 추석 문화 행사"

      - label: "날짜"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "행사 종류"
        name: "category"
        widget: "select"
        options:
          - { label: "🎓 졸업식", value: "graduation" }
          - { label: "🎉 학교 행사", value: "event" }
          - { label: "📚 수업 활동", value: "class" }
          - { label: "🎨 문화 체험", value: "culture" }
          - { label: "🏅 발표회", value: "performance" }
          - { label: "📷 기타", value: "other" }

      - label: "대표 사진"
        name: "cover"
        widget: "image"
        hint: "앨범 목록에서 보여질 대표 사진을 선택하세요"

      - label: "사진 목록"
        name: "photos"
        widget: "list"
        label_singular: "사진"
        fields:
          - label: "사진"
            name: "image"
            widget: "image"
          - label: "설명 (선택)"
            name: "caption"
            widget: "string"
            required: false
            hint: "사진에 대한 짧은 설명"

      - label: "앨범 설명 (선택)"
        name: "description"
        widget: "text"
        required: false
        hint: "이 행사에 대한 간단한 소개"

      - label: "공개 여부"
        name: "published"
        widget: "boolean"
        default: true
        label: "사이트에 공개"
