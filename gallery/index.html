<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학교 앨범 | 뉴질랜드 한민족 한글학교</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2340;
    --navy-mid: #1a3a5c;
    --teal: #1a7a6e;
    --teal-light: #2aa99a;
    --gold: #c8973a;
    --gold-light: #e8b84b;
    --cream: #f9f5ee;
    --white: #ffffff;
    --gray-light: #f2f4f7;
    --text: #1c2b3a;
    --text-light: #4a5f75;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--white); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 48px; height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(13,35,64,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,151,58,0.2);
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-emblem {
    width: 40px; height: 40px; background: var(--gold); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif KR', serif; font-weight: 900; color: var(--navy); font-size: 15px;
  }
  .nav-logo-kr { font-family: 'Noto Serif KR',serif; font-size: 13px; font-weight: 700; color: var(--white); display: block; }
  .nav-logo-en { font-size: 10px; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; display: block; }
  .nav-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold); }
  .nav-admin { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: color 0.2s; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 4px 10px; }
  .nav-admin:hover { color: var(--gold); border-color: rgba(200,151,58,0.4); }

  /* HERO */
  .hero {
    padding: 140px 48px 80px;
    background: linear-gradient(135deg, #071828 0%, #0d2340 60%, #0e2e4a 100%);
    position: relative; overflow: hidden;
  }
  .hero::after {
    content: '앨범'; position: absolute; right: 48px; bottom: -40px;
    font-family: 'Noto Serif KR', serif; font-size: 200px; font-weight: 900;
    color: rgba(255,255,255,0.03); pointer-events: none; line-height: 1;
  }
  .hero-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-label {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--teal-light); margin-bottom: 16px;
  }
  .hero-label::before { content: ''; display: block; width: 24px; height: 2px; background: var(--teal-light); }
  .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(32px, 5vw, 60px); font-weight: 900; color: var(--white); margin-bottom: 16px; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { color: rgba(255,255,255,0.55); font-size: 15px; }

  /* FILTERS */
  .filters { background: var(--white); padding: 28px 48px; border-bottom: 1px solid rgba(0,0,0,0.07); position: sticky; top: 72px; z-index: 50; }
  .filters-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 8px; }
  .filter-btn {
    padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(0,0,0,0.12);
    background: transparent; font-size: 13px; font-weight: 500; color: var(--text-light);
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.active { background: var(--navy); border-color: var(--navy); color: var(--white); }

  /* MAIN CONTENT */
  main { max-width: 1200px; margin: 0 auto; padding: 60px 48px 100px; }

  /* YEAR GROUPS */
  .year-group { margin-bottom: 64px; }
  .year-heading {
    display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
  }
  .year-num { font-family: 'Noto Serif KR', serif; font-size: 32px; font-weight: 900; color: var(--navy); }
  .year-line { flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
  .year-count { font-size: 12px; color: var(--text-light); font-weight: 500; }

  /* ALBUM GRID */
  .album-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

  .album-card {
    border-radius: 20px; overflow: hidden; background: var(--gray-light);
    cursor: pointer; transition: all 0.3s; text-decoration: none; display: block;
    border: 1px solid transparent;
  }
  .album-card:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(0,0,0,0.1); border-color: rgba(26,122,110,0.2); }

  .album-thumb {
    aspect-ratio: 4/3; background: var(--navy-mid);
    position: relative; overflow: hidden;
  }
  .album-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .album-card:hover .album-thumb img { transform: scale(1.05); }

  .album-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-mid), #0f3050);
  }
  .placeholder-emoji { font-size: 40px; margin-bottom: 8px; opacity: 0.6; }
  .placeholder-text { font-size: 12px; color: rgba(255,255,255,0.3); }

  .album-count-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(13,35,64,0.85); backdrop-filter: blur(8px);
    color: var(--white); font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .album-category-badge {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(200,151,58,0.9); color: var(--navy);
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
  }

  .album-info { padding: 20px; }
  .album-date { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
  .album-title { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 6px; line-height: 1.4; }
  .album-desc { font-size: 13px; color: var(--text-light); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 100px 24px; }
  .empty-emoji { font-size: 64px; margin-bottom: 20px; }
  .empty-state h3 { font-family: 'Noto Serif KR', serif; font-size: 24px; color: var(--navy); margin-bottom: 10px; }
  .empty-state p { color: var(--text-light); font-size: 15px; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(5, 12, 22, 0.96); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    background: var(--white); border-radius: 24px; overflow: hidden;
    max-width: 1000px; width: 100%; max-height: 90vh;
    display: grid; grid-template-columns: 1fr 340px;
    animation: lbIn 0.3s ease;
  }
  @keyframes lbIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  .lightbox-photos { background: #000; position: relative; min-height: 400px; display: flex; align-items: center; justify-content: center; }
  .lightbox-photos img { max-width: 100%; max-height: 70vh; object-fit: contain; }

  .lb-prev, .lb-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: var(--white); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.25); }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }

  .lb-photo-count {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.8);
    font-size: 12px; padding: 4px 14px; border-radius: 100px;
  }

  .lightbox-info { padding: 36px 32px; overflow-y: auto; display: flex; flex-direction: column; }
  .lb-close {
    align-self: flex-end; width: 36px; height: 36px; border-radius: 50%;
    background: var(--gray-light); border: none; cursor: pointer;
    font-size: 18px; color: var(--text); display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; transition: background 0.2s;
  }
  .lb-close:hover { background: #e0e0e0; }
  .lb-category { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
  .lb-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 8px; line-height: 1.35; }
  .lb-date { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
  .lb-desc { font-size: 14px; color: var(--text-light); line-height: 1.75; margin-bottom: 24px; flex: 1; }

  .lb-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .lb-thumb {
    aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
  }
  .lb-thumb.active { border-color: var(--gold); }
  .lb-thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* Loading */
  .loading { text-align: center; padding: 80px 24px; color: var(--text-light); font-size: 15px; }

  /* Responsive */
  @media (max-width: 900px) {
    nav, .filters { padding: 0 20px; }
    .filters { padding-top: 16px; padding-bottom: 16px; }
    .hero { padding: 120px 24px 60px; }
    main { padding: 40px 24px 80px; }
    .album-grid { grid-template-columns: 1fr 1fr; }
    .lightbox-inner { grid-template-columns: 1fr; max-height: 95vh; }
    .lightbox-photos { min-height: 260px; }
    .lb-thumbs { grid-template-columns: repeat(5, 1fr); }
  }
  @media (max-width: 560px) {
    .album-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="../index.html">
    <div class="nav-logo-emblem">한글</div>
    <div>
      <span class="nav-logo-kr">한민족 한글학교</span>
      <span class="nav-logo-en">NZSOK · Auckland</span>
    </div>
  </a>
  <div style="display:flex; align-items:center; gap:16px;">
    <a class="nav-back" href="../index.html">← 홈으로</a>
    <a class="nav-admin" href="../admin/" title="관리자 페이지">⚙️ 관리자</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <span class="hero-label">알림마당</span>
    <h1>학교 <em>앨범</em></h1>
    <p>소중한 순간들을 함께 나눕니다</p>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filters-inner">
    <span class="filter-label">분류</span>
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="graduation">🎓 졸업식</button>
    <button class="filter-btn" data-filter="event">🎉 학교 행사</button>
    <button class="filter-btn" data-filter="class">📚 수업 활동</button>
    <button class="filter-btn" data-filter="culture">🎨 문화 체험</button>
    <button class="filter-btn" data-filter="performance">🏅 발표회</button>
  </div>
</div>

<!-- MAIN -->
<main id="main-content">
  <div class="loading">앨범을 불러오는 중...</div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-inner">
    <div class="lightbox-photos">
      <img id="lb-main-img" src="" alt="">
      <button class="lb-prev" id="lb-prev" aria-label="이전 사진">‹</button>
      <button class="lb-next" id="lb-next" aria-label="다음 사진">›</button>
      <div class="lb-photo-count" id="lb-count"></div>
    </div>
    <div class="lightbox-info">
      <button class="lb-close" id="lb-close" aria-label="닫기">✕</button>
      <div class="lb-category" id="lb-cat"></div>
      <h2 class="lb-title" id="lb-title"></h2>
      <p class="lb-date" id="lb-date"></p>
      <p class="lb-desc" id="lb-desc"></p>
      <div class="lb-thumbs" id="lb-thumbs"></div>
    </div>
  </div>
</div>

<script>
// ─── Category labels ───────────────────────────────────────────
const CATEGORIES = {
  graduation:  '🎓 졸업식',
  event:       '🎉 학교 행사',
  class:       '📚 수업 활동',
  culture:     '🎨 문화 체험',
  performance: '🏅 발표회',
  other:       '📷 기타'
};

// ─── Fetch albums from _albums directory via Netlify ───────────
// Albums are generated at build time into albums.json by a Netlify build script.
// During development, we use sample data.
async function fetchAlbums() {
  try {
    const res = await fetch('/albums.json');
    if (!res.ok) throw new Error('no albums.json');
    return await res.json();
  } catch {
    // Return sample data for preview/development
    return getSampleAlbums();
  }
}

function getSampleAlbums() {
  return [
    {
      title: "2024년 졸업식",
      date: "2024-11-30",
      category: "graduation",
      cover: null,
      photos: [
        { image: null, caption: "졸업식 전체 사진" },
        { image: null, caption: "졸업생들과 선생님" },
        { image: null, caption: "상장 수여식" }
      ],
      description: "2024년 한 해를 마무리하는 졸업식이 성황리에 열렸습니다. 학생들의 성장에 축하를 보냅니다.",
      published: true,
      slug: "2024-11-30-graduation"
    },
    {
      title: "추석 문화 체험",
      date: "2024-09-14",
      category: "culture",
      cover: null,
      photos: [
        { image: null, caption: "송편 만들기" },
        { image: null, caption: "한복 입기 체험" }
      ],
      description: "추석을 맞아 송편 만들기와 한복 입기 체험을 진행했습니다.",
      published: true,
      slug: "2024-09-14-chuseok"
    },
    {
      title: "2024 발표회",
      date: "2024-06-22",
      category: "performance",
      cover: null,
      photos: [
        { image: null, caption: "1학기 발표회" },
        { image: null, caption: "노래 발표" },
        { image: null, caption: "시 낭송" },
        { image: null, caption: "단체 사진" }
      ],
      description: "1학기 마무리 발표회. 학생들이 한 학기 동안 배운 것들을 발표했습니다.",
      published: true,
      slug: "2024-06-22-performance"
    },
    {
      title: "신입생 환영회",
      date: "2024-02-10",
      category: "event",
      cover: null,
      photos: [
        { image: null, caption: "환영 행사" }
      ],
      description: "새 학년 신입생들을 환영하는 자리였습니다.",
      published: true,
      slug: "2024-02-10-welcome"
    },
    {
      title: "한국어 수업 활동",
      date: "2023-08-19",
      category: "class",
      cover: null,
      photos: [
        { image: null, caption: "수업 장면" },
        { image: null, caption: "그룹 활동" }
      ],
      description: "열심히 공부하는 학생들의 수업 장면입니다.",
      published: true,
      slug: "2023-08-19-class"
    }
  ];
}

// ─── Render ────────────────────────────────────────────────────
let allAlbums = [];
let currentFilter = 'all';
let currentAlbum = null;
let currentPhotoIdx = 0;

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function getYear(dateStr) {
  return new Date(dateStr).getFullYear();
}

function renderAlbums(albums) {
  const main = document.getElementById('main-content');
  const filtered = albums.filter(a =>
    a.published !== false &&
    (currentFilter === 'all' || a.category === currentFilter)
  );

  if (filtered.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">📷</div>
        <h3>아직 앨범이 없어요</h3>
        <p>곧 추가될 예정입니다</p>
      </div>`;
    return;
  }

  // Group by year
  const byYear = {};
  filtered.forEach(a => {
    const y = getYear(a.date);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(a);
  });

  const years = Object.keys(byYear).sort((a,b) => b - a);

  main.innerHTML = years.map(year => `
    <div class="year-group" data-year="${year}">
      <div class="year-heading">
        <span class="year-num">${year}</span>
        <div class="year-line"></div>
        <span class="year-count">앨범 ${byYear[year].length}개</span>
      </div>
      <div class="album-grid">
        ${byYear[year].map((album, idx) => renderCard(album, idx)).join('')}
      </div>
    </div>
  `).join('');

  // Attach click handlers
  document.querySelectorAll('.album-card').forEach(card => {
    card.addEventListener('click', e => {
      e.preventDefault();
      const slug = card.dataset.slug;
      openLightbox(allAlbums.find(a => a.slug === slug));
    });
  });
}

function renderCard(album, idx) {
  const EMOJIS = { graduation:'🎓', event:'🎉', class:'📚', culture:'🎨', performance:'🏅', other:'📷' };
  const photoCount = album.photos ? album.photos.length : 0;
  const thumbHtml = album.cover
    ? `<img src="${album.cover}" alt="${album.title}" loading="lazy">`
    : `<div class="album-thumb-placeholder">
         <div class="placeholder-emoji">${EMOJIS[album.category] || '📷'}</div>
         <div class="placeholder-text">${album.title}</div>
       </div>`;

  return `
    <a class="album-card" href="#" data-slug="${album.slug}" data-category="${album.category}">
      <div class="album-thumb">
        ${thumbHtml}
        ${photoCount > 0 ? `<span class="album-count-badge">📸 ${photoCount}장</span>` : ''}
        <span class="album-category-badge">${CATEGORIES[album.category] || '기타'}</span>
      </div>
      <div class="album-info">
        <div class="album-date">${formatDate(album.date)}</div>
        <div class="album-title">${album.title}</div>
        ${album.description ? `<div class="album-desc">${album.description}</div>` : ''}
      </div>
    </a>`;
}

// ─── Lightbox ──────────────────────────────────────────────────
function openLightbox(album) {
  currentAlbum = album;
  currentPhotoIdx = 0;
  updateLightboxContent();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightboxContent() {
  const album = currentAlbum;
  const photos = album.photos || [];
  const photo = photos[currentPhotoIdx];

  document.getElementById('lb-cat').textContent = CATEGORIES[album.category] || '';
  document.getElementById('lb-title').textContent = album.title;
  document.getElementById('lb-date').textContent = formatDate(album.date);
  document.getElementById('lb-desc').textContent = album.description || '';
  document.getElementById('lb-count').textContent = `${currentPhotoIdx + 1} / ${photos.length}`;

  const mainImg = document.getElementById('lb-main-img');
  if (photo && photo.image) {
    mainImg.src = photo.image;
    mainImg.alt = photo.caption || album.title;
    mainImg.style.display = '';
  } else {
    mainImg.src = '';
    mainImg.style.display = 'none';
  }

  // Thumbnails
  const thumbsEl = document.getElementById('lb-thumbs');
  thumbsEl.innerHTML = photos.map((p, i) => `
    <div class="lb-thumb ${i === currentPhotoIdx ? 'active' : ''}" data-idx="${i}">
      ${p.image
        ? `<img src="${p.image}" alt="${p.caption || ''}" loading="lazy">`
        : `<div style="width:100%;height:100%;background:#1a3a5c;display:flex;align-items:center;justify-content:center;font-size:18px">📷</div>`
      }
    </div>`
  ).join('');

  thumbsEl.querySelectorAll('.lb-thumb').forEach(t => {
    t.addEventListener('click', () => {
      currentPhotoIdx = parseInt(t.dataset.idx);
      updateLightboxContent();
    });
  });

  // Show/hide nav buttons
  document.getElementById('lb-prev').style.display = currentPhotoIdx === 0 ? 'none' : '';
  document.getElementById('lb-next').style.display = currentPhotoIdx >= photos.length - 1 ? 'none' : '';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', () => { currentPhotoIdx--; updateLightboxContent(); });
document.getElementById('lb-next').addEventListener('click', () => { currentPhotoIdx++; updateLightboxContent(); });
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && currentPhotoIdx > 0) { currentPhotoIdx--; updateLightboxContent(); }
  if (e.key === 'ArrowRight' && currentAlbum && currentPhotoIdx < currentAlbum.photos.length - 1) { currentPhotoIdx++; updateLightboxContent(); }
});

// ─── Filter buttons ────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAlbums(allAlbums);
  });
});

// ─── Init ──────────────────────────────────────────────────────
fetchAlbums().then(albums => {
  allAlbums = albums;
  renderAlbums(albums);
});
</script>
