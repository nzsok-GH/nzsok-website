[build]
  command = "npm run build"
  publish = "dist"

[template.environment]
  NETLIFY_GRAPH_PERSIST_QUERY_DEPLOY_HOOK = ""

# SPA fallback — all routes served by index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/admin/*"
    [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/images/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
