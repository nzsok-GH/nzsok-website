[build]
  command = "node build-albums.js"
  publish = "."

# Identity & Git Gateway (CMS 로그인용)
[template.environment]
  NETLIFY_GRAPH_PERSIST_QUERY_DEPLOY_HOOK = ""

[[redirects]]
  from = "/gallery"
  to = "/gallery/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/admin/*"
    [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/images/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
